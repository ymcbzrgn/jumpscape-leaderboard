name: Update Leaderboard

on:
  repository_dispatch:
    types: [new-score]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update Leaderboard and Push
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          PLAYER_NAME: ${{ github.event.client_payload.playerName }}
          PLAYER_SCORE: ${{ github.event.client_payload.score }}
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "leaderboard-bot@users.noreply.github.com"
          
          MAX_RETRIES=15
          RETRY_COUNT=0
          SUCCESS=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            git fetch origin main
            git reset --hard origin/main
            node scripts/update-leaderboard.js
            git add README.md
            if git diff --staged --quiet; then
              echo "No changes needed."
              SUCCESS=1
              break
            fi
            git commit -m "🏆 Update leaderboard: $PLAYER_NAME scored $PLAYER_SCORE"
            if git push origin main; then
              echo "Successfully pushed!"
              SUCCESS=1
              break
            fi
            echo "Push rejected. Retrying..."
            RETRY_COUNT=$((RETRY_COUNT+1))
            sleep $((RANDOM % 5 + 1))
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "Failed to update after $MAX_RETRIES attempts."
            exit 1
          fi
