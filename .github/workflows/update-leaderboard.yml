name: Update Leaderboard

on:
  repository_dispatch:
    types: [new-score]

concurrency:
  group: leaderboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update Leaderboard
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/update-leaderboard.js

      - name: Commit and Push
        env:
          PLAYER_NAME: ${{ github.event.client_payload.playerName }}
          PLAYER_SCORE: ${{ github.event.client_payload.score }}
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "leaderboard-bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🏆 Update leaderboard: $PLAYER_NAME scored $PLAYER_SCORE"
          git pull --rebase origin main
          git push
