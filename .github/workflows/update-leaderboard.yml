name: Update Leaderboard

on:
  repository_dispatch:
    types: [new-score]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Leaderboard
        run: node scripts/update-leaderboard.js '${{ toJson(github.event.client_payload) }}'

      - name: Commit and Push
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "leaderboard-bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🏆 Update leaderboard: ${{ github.event.client_payload.playerName }} scored ${{ github.event.client_payload.score }}"
          git push
